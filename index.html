<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQC Pro | AI Data Inspector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-box" class="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 class="auth-header">Login</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn-auth-primary">Login</button>
            </form>
            <p class="auth-toggle-text">No account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>

        <div id="register-box" class="auth-card" style="display: none;">
            <h2 class="auth-header">Register</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="register-username" placeholder="Create Username" required>
                <input type="password" id="register-password" placeholder="Create Password" required>
                <button type="submit" class="btn-auth-primary">Sign Up</button>
            </form>
            <p class="auth-toggle-text">Have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>

    <div id="main" class="container" style="display: none;">
        <header>
            <h1>DQC PRO <span style="color: #3b82f6;">AI-Powered</span></h1>
            <div class="user-info">
                User: <span id="user-display" style="color: #3b82f6; font-weight: bold;"></span> | 
                <a href="#" onclick="location.reload()" style="color: #ef4444; text-decoration: none;">Logout</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Rows Scan</h3><p id="rows">0</p></div>
            <div class="stat-card"><h3>Columns</h3><p id="cols">0</p></div>
            <div class="stat-card"><h3>Total Errors</h3><p id="errors">0</p></div>
            <div class="stat-card"><h3>Data Quality</h3><p id="quality">0%</p></div>
        </div>

        <div class="upload-section">
            <form onsubmit="handleUpload(event)">
                <input type="file" id="file" style="color: #9ca3af;">
                <br>
                <button type="submit" class="btn-scan">Start Intelligence Scan</button>
            </form>
            <div id="loader" style="display:none; margin-top: 15px; color: #3b82f6;">Analyzing Dataset...</div>
        </div>

        <div class="log-section">
            <h3 style="margin-top: 0;">Inspection Log</h3>
            <div id="error-list" class="error-log">
                <p style="color: #4b5563;">Waiting for file upload...</p>
            </div>
        </div>

        <button id="dl-btn" class="btn-download" style="display: none;" onclick="handleDownload(event)">Export PDF Intelligence Report</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
